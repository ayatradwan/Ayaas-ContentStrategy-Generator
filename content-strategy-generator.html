<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Strategy Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0e;
    --surface: #141416;
    --surface2: #1c1c1f;
    --border: #2a2a2e;
    --accent: #d4f050;
    --accent2: #8b5cf6;
    --text: #f0f0f0;
    --muted: #6b6b73;
    --tag-bg: #1e2a12;
    --tag-text: #d4f050;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(212,240,80,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(212,240,80,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* Header */
  .header {
    margin-bottom: 48px;
  }
  .badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--tag-bg);
    border: 1px solid rgba(212,240,80,0.25);
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 20px;
  }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(36px, 6vw, 58px);
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 12px;
  }
  h1 em {
    font-style: italic;
    color: var(--accent);
  }
  .subtext {
    color: var(--muted);
    font-size: 15px;
    font-weight: 400;
    max-width: 500px;
    line-height: 1.6;
  }

  /* Form */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
  }
  .form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  input, select, textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    width: 100%;
  }
  input::placeholder, textarea::placeholder { color: var(--muted); }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(212,240,80,0.08);
  }
  textarea { resize: vertical; min-height: 80px; }
  select option { background: var(--surface2); }

  /* Checkboxes */
  .checkbox-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }
  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
  }
  .checkbox-item input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
    padding: 0;
  }
  .checkbox-item span {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    text-transform: none;
    letter-spacing: 0;
  }

  /* CTA */
  .btn-generate {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px 32px;
    background: var(--accent);
    color: #0c0c0e;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .btn-generate:hover { background: #e0f760; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(212,240,80,0.2); }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-icon { font-size: 18px; }

  /* Loading */
  .loading-state {
    display: none;
    text-align: center;
    padding: 60px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 32px;
  }
  .loading-state.active { display: block; }
  .spinner {
    width: 40px;
    height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .loading-dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0%, 20% { content: ''; }
    40% { content: '.'; }
    60% { content: '..'; }
    80%, 100% { content: '...'; }
  }

  /* Output */
  .output-wrapper {
    display: none;
    animation: fadeIn 0.4s ease;
  }
  .output-wrapper.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .output-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--accent);
  }
  .btn-reset {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-reset:hover { color: var(--text); border-color: var(--text); }

  .output-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px;
    line-height: 1.75;
    font-size: 14.5px;
    position: relative;
    overflow: hidden;
  }
  .output-content::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent2), transparent);
    opacity: 0.6;
  }

  /* Rendered markdown styles */
  .output-content h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--accent);
    margin: 32px 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .output-content h2:first-child { margin-top: 0; }
  .output-content h3 {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent2);
    margin: 24px 0 8px;
  }
  .output-content p { margin-bottom: 12px; color: #d0d0d8; }
  .output-content ul, .output-content ol {
    padding-left: 20px;
    margin-bottom: 14px;
  }
  .output-content li { margin-bottom: 6px; color: #d0d0d8; }
  .output-content strong { color: var(--text); font-weight: 600; }
  .output-content em { color: var(--accent); font-style: normal; font-weight: 500; }
  .output-content code {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: var(--surface2);
    padding: 2px 7px;
    border-radius: 5px;
    color: var(--accent);
  }
  .output-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0 24px;
    font-size: 13px;
  }
  .output-content th {
    background: var(--surface2);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .output-content td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    color: #d0d0d8;
    vertical-align: top;
  }
  .output-content tr:last-child td { border-bottom: none; }
  .output-content blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 16px;
    margin: 16px 0;
    color: var(--muted);
    font-style: italic;
  }

  /* Copy button */
  .btn-copy {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 24px;
    font-family: 'Syne', sans-serif;
  }
  .btn-copy:hover { color: var(--text); border-color: var(--accent); }

  /* Error */
  .error-msg {
    display: none;
    background: rgba(239, 68, 68, 0.08);
    border: 1px solid rgba(239, 68, 68, 0.3);
    border-radius: 10px;
    padding: 16px 20px;
    color: #fca5a5;
    font-size: 14px;
    margin-bottom: 24px;
  }
  .error-msg.active { display: block; }

  @media (max-width: 640px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
    .container { padding: 32px 16px 60px; }
    .output-content { padding: 24px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="badge">Elephant Phunk · Strategy Engine</div>
    <h1>Content<br>Strategy <em>Generator</em></h1>
    <p class="subtext">Fill in the client brief. Get a full content strategy — pillars, clusters, priority topics, and buyer-stage mapping — in seconds.</p>
  </div>

  <div class="form-card" id="formCard">
    <div class="form-grid">
      <div class="form-group">
        <label>Client / Brand Name</label>
        <input type="text" id="brand" placeholder="e.g. Fortis, Plexus Aviation" />
      </div>
      <div class="form-group">
        <label>Industry</label>
        <input type="text" id="industry" placeholder="e.g. Fintech, Private Aviation" />
      </div>
      <div class="form-group full">
        <label>What does the brand do?</label>
        <textarea id="description" placeholder="Briefly describe the product/service, who it's for, and the core value it offers..."></textarea>
      </div>
      <div class="form-group">
        <label>Target Audience</label>
        <input type="text" id="audience" placeholder="e.g. Egyptian white-collar, HNWIs" />
      </div>
      <div class="form-group">
        <label>Primary Content Goal</label>
        <select id="goal" onchange="toggleOtherGoal(this.value)">
          <option value="">Select a goal</option>
          <option value="brand awareness">Brand Awareness</option>
          <option value="lead generation">Lead Generation</option>
          <option value="thought leadership">Thought Leadership</option>
          <option value="traffic & SEO">Traffic & SEO</option>
          <option value="community building">Community Building</option>
          <option value="retention & loyalty">Retention & Loyalty</option>
          <option value="other">Other</option>
        </select>
        <input type="text" id="goalOther" placeholder="Describe your goal..." style="display:none; margin-top:8px;" />
      </div>
      <div class="form-group">
        <label>Main Competitors (optional)</label>
        <input type="text" id="competitors" placeholder="e.g. Competitor A, Competitor B" />
      </div>
      <div class="form-group">
        <label>Client Website (optional)</label>
        <input type="url" id="website" placeholder="e.g. https://fortis.com" />
      </div>
      <div class="form-group">
        <label>Key Customer Pain Points</label>
        <textarea id="painpoints" placeholder="What problems do customers face that this brand solves?" style="min-height:64px;"></textarea>
      </div>
      <div class="form-group">
        <label>Content Formats Available</label>
        <div class="checkbox-group">
          <label class="checkbox-item"><input type="checkbox" value="written articles" checked> <span>Articles</span></label>
          <label class="checkbox-item"><input type="checkbox" value="social media posts" checked> <span>Social</span></label>
          <label class="checkbox-item"><input type="checkbox" value="video"> <span>Video</span></label>
          <label class="checkbox-item"><input type="checkbox" value="email newsletters"> <span>Email</span></label>
          <label class="checkbox-item"><input type="checkbox" value="infographics"> <span>Infographics</span></label>
          <label class="checkbox-item"><input type="checkbox" value="case studies"> <span>Case Studies</span></label>
        </div>
      </div>
      <div class="form-group full">
        <label>Language / Market</label>
        <select id="language">
          <option value="English (Egyptian market)">English – Egyptian Market</option>
          <option value="Arabic (Egyptian dialect)">Arabic – Egyptian Market</option>
          <option value="English (Saudi market)">English – Saudi Market</option>
          <option value="Arabic (Saudi market)">Arabic – Saudi Market</option>
          <option value="Bilingual English/Arabic">Bilingual English + Arabic</option>
          <option value="English (regional MENA)">English – Regional MENA</option>
        </select>
      </div>
    </div>
    <button class="btn-generate" id="generateBtn" onclick="generateStrategy()">
      <span class="btn-icon">⚡</span> Generate Content Strategy
    </button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    <div class="loading-label">Building your strategy<span class="loading-dots"></span></div>
  </div>

  <div class="output-wrapper" id="outputWrapper">
    <div class="output-header">
      <div class="output-title">Strategy Ready</div>
      <button class="btn-reset" onclick="resetForm()">← New Strategy</button>
    </div>
    <div class="output-content" id="outputContent"></div>
    <button class="btn-copy" onclick="copyOutput()">📋 Copy to Clipboard</button>
  </div>

</div>

<script>
  function getCheckedFormats() {
    const boxes = document.querySelectorAll('.checkbox-item input[type="checkbox"]');
    return Array.from(boxes).filter(b => b.checked).map(b => b.value).join(', ');
  }

  function simpleMarkdown(text) {
    // Headers
    text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    text = text.replace(/^# (.+)$/gm, '<h2>$1</h2>');
    // Bold/italic
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Code
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Blockquotes
    text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
    // Tables
    text = text.replace(/(\|.+\|\n)+/g, (table) => {
      const rows = table.trim().split('\n');
      let html = '<table>';
      rows.forEach((row, i) => {
        if (row.match(/^\|[-:\s|]+\|$/)) return; // skip separator
        const cells = row.split('|').filter((_, j, a) => j > 0 && j < a.length - 1);
        const tag = i === 0 ? 'th' : 'td';
        html += '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
      });
      return html + '</table>';
    });
    // Lists
    text = text.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
    text = text.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
    text = text.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
    // Paragraphs
    const lines = text.split('\n');
    let result = '';
    let inBlock = false;
    for (const line of lines) {
      if (!line.trim()) { if (inBlock) { result += '</p>'; inBlock = false; } continue; }
      if (line.startsWith('<')) { if (inBlock) { result += '</p>'; inBlock = false; } result += line + '\n'; continue; }
      if (!inBlock) { result += '<p>'; inBlock = true; }
      result += line + ' ';
    }
    if (inBlock) result += '</p>';
    return result;
  }

  function toggleOtherGoal(val) {
    const otherInput = document.getElementById('goalOther');
    otherInput.style.display = val === 'other' ? 'block' : 'none';
    if (val !== 'other') otherInput.value = '';
  }

  async function generateStrategy() {
    const brand = document.getElementById('brand').value.trim();
    const industry = document.getElementById('industry').value.trim();
    const description = document.getElementById('description').value.trim();
    const audience = document.getElementById('audience').value.trim();
    const goalSelect = document.getElementById('goal').value;
    const goalOther = document.getElementById('goalOther').value.trim();
    const goal = goalSelect === 'other' ? (goalOther || 'Other') : goalSelect;
    const competitors = document.getElementById('competitors').value.trim();
    const website = document.getElementById('website').value.trim();
    const painpoints = document.getElementById('painpoints').value.trim();
    const formats = getCheckedFormats();
    const language = document.getElementById('language').value;

    if (!brand || !description || !audience || !goal) {
      const err = document.getElementById('errorMsg');
      err.textContent = 'Please fill in Brand Name, Description, Target Audience, and Primary Goal.';
      err.classList.add('active');
      setTimeout(() => err.classList.remove('active'), 4000);
      return;
    }

    document.getElementById('generateBtn').disabled = true;
    document.getElementById('loadingState').classList.add('active');
    document.getElementById('outputWrapper').classList.remove('active');
    document.getElementById('errorMsg').classList.remove('active');

    const prompt = `You are a senior content strategist at a top-tier digital marketing agency in Cairo.

Build a complete content strategy for the following client brief:

**Brand:** ${brand}
**Industry:** ${industry}
**What they do:** ${description}
**Target Audience:** ${audience}
**Primary Goal:** ${goal}
**Competitors:** ${competitors || 'Not specified'}
**Client Website:** ${website || 'Not provided'}
**Customer Pain Points:** ${painpoints || 'Not specified'}
**Available Formats:** ${formats}
**Language/Market:** ${language}

Deliver the full strategy in this structure:

## Brand & Audience Snapshot
Quick synthesis of the brand's position and content opportunity (3–4 sentences).

## Content Pillars
Define 3–4 core content pillars. For each pillar:
- Pillar name + one-line rationale
- How it connects to the product/service
- 3–4 subtopic clusters under it

## Priority Content Ideas
Give a prioritized table of 10 content ideas across the pillars:

| # | Title / Topic | Pillar | Type | Searchable/Shareable | Buyer Stage | Why This |
|---|---------------|--------|------|---------------------|-------------|---------|

## Topic Cluster Map
Show how the content interconnects — which pieces link to which, and which should be created first (use a structured outline format, not a visual).

## Quick Win Recommendations
3 content pieces to publish first (highest impact, lowest effort). Explain why each.

## Content Cadence Suggestion
Recommended publishing frequency per format, given the available resources. Keep it realistic for a lean team.

Be specific, sharp, and actionable. No filler. Tailor everything to the ${language} market. Think like an agency strategist who bills $200/hr.`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 4000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      if (!response.ok) throw new Error(`API error ${response.status}`);
      const data = await response.json();
      const raw = data.content?.map(b => b.text || '').join('\n') || '';

      document.getElementById('outputContent').innerHTML = simpleMarkdown(raw);
      document.getElementById('outputWrapper').classList.add('active');
    } catch (err) {
      const errEl = document.getElementById('errorMsg');
      errEl.textContent = 'Something went wrong generating the strategy. Please try again.';
      errEl.classList.add('active');
    } finally {
      document.getElementById('loadingState').classList.remove('active');
      document.getElementById('generateBtn').disabled = false;
    }
  }

  function resetForm() {
    document.getElementById('outputWrapper').classList.remove('active');
    document.getElementById('brand').value = '';
    document.getElementById('industry').value = '';
    document.getElementById('description').value = '';
    document.getElementById('audience').value = '';
    document.getElementById('goal').value = '';
    document.getElementById('competitors').value = '';
    document.getElementById('painpoints').value = '';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function copyOutput() {
    const text = document.getElementById('outputContent').innerText;
    try {
      await navigator.clipboard.writeText(text);
      const btn = document.querySelector('.btn-copy');
      btn.textContent = '✓ Copied!';
      setTimeout(() => btn.textContent = '📋 Copy to Clipboard', 2000);
    } catch {}
  }
</script>
</body>
</html>
